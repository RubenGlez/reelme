name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  template:
    name: Template
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: template/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: template

      - name: Typecheck
        run: pnpm typecheck
        working-directory: template

      - name: Lint
        run: pnpm lint
        working-directory: template

      - name: Test
        run: pnpm test
        working-directory: template
